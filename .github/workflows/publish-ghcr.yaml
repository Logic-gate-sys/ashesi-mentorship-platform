name: Docker Image CI for Mentor app actions

on:
  push:
    branches: ["main", "dashboard-integration-refined"] 
jobs: 
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GHCR
        run : docker login --username logic-gate-sys --password ${{secrets.GHCR_PAT}} ghcr.io

      - name: Build image
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_SOCKET_PORT: ${{ secrets.NEXT_PUBLIC_SOCKET_PORT }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          SOCKET_HOST: ${{ secrets.SOCKET_HOST }} 
        run: docker compose build 

      - name: Push built image to GHCR
        run : docker compose push 